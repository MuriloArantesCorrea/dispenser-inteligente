<!DOCTYPE html>
<html>
<head>
  <title>Dispenser Inteligente</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      margin: 50px auto;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .status {
      font-size: 24px;
      margin-top: 20px;
    }

    .ativo {
      color: #22c55e;
    }

    .inativo {
      color: #ef4444;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🚿 Dispenser</h1>

    <h2 id="distancia">-- cm</h2>

    <div id="status" class="status">--</div>
  </div>

  <script>
    async function atualizar() {
      const res = await fetch('http://127.0.0.1:3000/dados');
      const dados = await res.json();

      document.getElementById('distancia').innerText =
        dados.distancia + " cm";

      const statusEl = document.getElementById('status');

      if (dados.status === "DISPENSANDO") {
        statusEl.innerText = "DISPENSANDO";
        statusEl.className = "status ativo";
      } else {
        statusEl.innerText = "AGUARDANDO";
        statusEl.className = "status inativo";
      }
    }

    setInterval(atualizar, 1000);
  </script>

</body>
</html>
